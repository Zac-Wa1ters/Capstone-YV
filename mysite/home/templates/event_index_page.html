{% extends "base.html" %}

{% block content %}

    {% for event in page.get_children.live %}

        <div class="event-card">
            <h1>{{ event.specific.title }}</h1>
            <p>{{ event.specific.event_date }}</p>

            <a href="{{ event.url }}" class="button">
                See Details
            </a>
        </div>

    {% endfor %}

{% endblock %}
